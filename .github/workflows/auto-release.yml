name: Auto Release

# Triggered on every push to main. Reads conventional commit messages since the
# last tag, bumps the semver accordingly, creates a new tag, then the existing
# release.yml workflow handles building and publishing the APK automatically.
#
# Commit prefix → version bump:
#   feat!: / fix!: / BREAKING CHANGE  →  major
#   feat:                              →  minor
#   fix: / perf: / refactor: / …      →  patch
#   chore: / docs: / style: / ci:     →  no release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to push the new tag

jobs:
  auto-tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      new_tag:   ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the action can read all commits

      - name: Bump version from conventional commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Commits with these prefixes produce NO new tag (skip release)
          custom_release_rules: |
            chore:patch:Chores
            docs:patch:Documentation
            style:patch:Styles
            ci:patch:CI
          # Allow the action to create annotated tags
          tag_prefix: 'v'
          # Default bump when no conventional prefix is detected
          default_bump: patch
          # Never bump on merge commits that only change CI files
          dry_run: false

      - name: Log outcome
        run: |
          if [ -z "${{ steps.tag.outputs.new_tag }}" ]; then
            echo "No releasable commits since last tag — skipping."
          else
            echo "New tag: ${{ steps.tag.outputs.new_tag }}"
            echo "Changelog:"
            echo "${{ steps.tag.outputs.changelog }}"
          fi
