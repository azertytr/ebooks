name: Multi-Method APK Build

# Workflow for building APK with multiple fallback methods
# Triggered manually or automatically when CI passes

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.3)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (e.g. 42)'
        required: false
        default: '1'
      build_method:
        description: 'Build method (auto/gradle/docker/clean)'
        required: false
        default: 'auto'

  # Also trigger on successful CI completion
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, develop, claude/**]

permissions:
  contents: write
  checks: write

jobs:
  build-apk:
    name: Build APK (${{ matrix.method }})
    runs-on: ubuntu-latest

    # Only run the first method that succeeds
    strategy:
      matrix:
        method: [gradle, docker, clean-gradle]
      max-parallel: 1
      fail-fast: false

    env:
      VERSION_NAME: v${{ github.event.inputs.version_name || '1.0.0' }}
      VERSION_CODE: ${{ github.event.inputs.version_code || github.run_number }}
      APK_DIR: ./apk

    steps:
      - name: Check if manual trigger
        id: manual
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "triggered=true" >> $GITHUB_OUTPUT
          else
            echo "triggered=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Set up Docker (for Docker method)
        if: matrix.method == 'docker'
        run: |
          # Check Docker availability
          docker --version || echo "Docker not available"
          docker ps || echo "Docker daemon check failed"

      - name: Build APK - Gradle method
        if: matrix.method == 'gradle'
        run: |
          echo "🏗️  Building with Gradle method..."
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}"
          mkdir -p "$APK_DIR"
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} "$APK_DIR/" \;
          echo "gradle_success=true" >> $GITHUB_ENV

      - name: Build APK - Docker method
        if: matrix.method == 'docker' && env.gradle_success != 'true'
        continue-on-error: true
        run: |
          echo "🐳 Building with Docker method..."
          if [ ! -f "Dockerfile" ]; then
            echo "Dockerfile not found, skipping Docker method"
            exit 1
          fi
          docker build \
            --build-arg VERSION_CODE="${VERSION_CODE}" \
            --build-arg VERSION_NAME="${VERSION_NAME}" \
            -t ebook-reader:latest \
            -f Dockerfile \
            .
          mkdir -p "$APK_DIR"
          TEMP_CONTAINER=$(docker run -d ebook-reader:latest sleep 999)
          trap "docker rm -f $TEMP_CONTAINER 2>/dev/null || true" EXIT
          docker cp "$TEMP_CONTAINER":/out/. "$APK_DIR/" || true
          docker rm -f "$TEMP_CONTAINER" 2>/dev/null || true
          echo "docker_success=true" >> $GITHUB_ENV

      - name: Build APK - Clean Gradle method
        if: matrix.method == 'clean-gradle' && env.gradle_success != 'true' && env.docker_success != 'true'
        continue-on-error: true
        run: |
          echo "🧹 Building with clean Gradle method..."
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}"
          mkdir -p "$APK_DIR"
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} "$APK_DIR/" \;
          echo "clean_gradle_success=true" >> $GITHUB_ENV

      - name: Verify APK built
        id: verify
        run: |
          mkdir -p "$APK_DIR"
          if find "$APK_DIR" -name "*.apk" -type f | grep -q .; then
            APK_COUNT=$(find "$APK_DIR" -name "*.apk" -type f | wc -l)
            echo "success=true" >> $GITHUB_OUTPUT
            echo "count=$APK_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Found $APK_COUNT APK(s) in $APK_DIR"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ No APK found"
            exit 0  # Don't fail, let next method try
          fi

      - name: Upload APK artifacts
        if: steps.verify.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: EbookReader-APK-${{ env.VERSION_NAME }}-${{ matrix.method }}
          path: apk/*.apk
          retention-days: 90
          if-no-files-found: ignore

  # Summary job that runs after all build attempts
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-apks
          pattern: EbookReader-APK-*

      - name: Check if any APK was built
        id: check
        run: |
          if find all-apks -name "*.apk" -type f | grep -q .; then
            echo "success=true" >> $GITHUB_OUTPUT
            APK_COUNT=$(find all-apks -name "*.apk" -type f | wc -l)
            echo "count=$APK_COUNT" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Success report
        if: steps.check.outputs.success == 'true'
        run: |
          echo "✅ APK Build Successful!"
          echo ""
          echo "Summary:"
          find all-apks -name "*.apk" -type f | while read -r apk; do
            echo "  📦 $(basename "$apk") ($(ls -lh "$apk" | awk '{print $5}'))"
          done

      - name: Failure report
        if: steps.check.outputs.success == 'false'
        run: |
          echo "❌ All APK build methods failed"
          echo ""
          echo "Troubleshooting:"
          echo "1. Check Java version: java -version"
          echo "2. Check Android SDK: \$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list"
          echo "3. Check Docker (if using Docker method): docker ps"
          echo "4. Review detailed logs from each build method above"
          exit 1

      - name: Create status check
        if: always()
        run: |
          STATUS="${{ steps.check.outputs.success }}"
          if [ "$STATUS" == "true" ]; then
            echo "✅ APK build completed successfully"
          else
            echo "⚠️  APK build was not completed (check artifacts)"
          fi
