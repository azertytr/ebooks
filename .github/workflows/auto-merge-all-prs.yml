name: Auto Merge All PRs

# Manually trigger auto-merge for all open PRs on main
# or run on a schedule to periodically check and enable auto-merge
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual merges)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge-all:
    name: Enable auto-merge on all open PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable auto-merge on all non-draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # Don't exit on command failures

          DRY_RUN="${{ inputs.dry_run }}"
          REPO="${{ github.repository }}"
          BRANCH="main"

          echo "🔄 Auto-merging PRs for $REPO (branch: $BRANCH)"
          [[ "$DRY_RUN" == "true" ]] && echo "📋 DRY RUN MODE - no actual merges will occur"
          echo ""

          # Get all open PRs targeting main
          MERGED=0
          SKIPPED=0
          FAILED=0

          while read -r PR_NUMBER IS_DRAFT; do
            # Skip if values are empty
            if [[ -z "$PR_NUMBER" ]] || [[ -z "$IS_DRAFT" ]]; then
              continue
            fi

            # Skip draft PRs
            if [[ "$IS_DRAFT" == "true" ]]; then
              echo "⏭️  PR #$PR_NUMBER (draft - skipping)"
              ((SKIPPED++))
              continue
            fi

            echo -n "🔄 PR #$PR_NUMBER: "

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "would enable auto-merge"
              ((MERGED++))
            else
              # Enable auto-merge with squash strategy
              if gh pr merge --auto --squash "$PR_NUMBER" --repo "$REPO" 2>/dev/null; then
                echo "✅ auto-merge enabled"
                ((MERGED++))
              else
                echo "⚠️  could not enable (checks may not be passing)"
                ((FAILED++))
              fi
            fi
          done < <(gh pr list \
            --repo "$REPO" \
            --state open \
            --base "$BRANCH" \
            --jq '.[] | "\(.number) \(.isDraft)"' \
            --limit 100)

          echo ""
          echo "📊 Summary:"
          echo "   ✅ Auto-merged: $MERGED"
          echo "   ⏭️  Skipped (draft): $SKIPPED"
          echo "   ⚠️  Failed: $FAILED"
