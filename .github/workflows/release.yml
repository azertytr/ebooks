name: Release APK

# Triggered automatically when auto-release.yml pushes a semver tag,
# or manually via workflow_dispatch for one-off releases.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    env:
      # Resolve version: tag name takes priority, then manual input, then fallback.
      VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version_name || '1.0.0') }}
      # versionCode = total number of Actions runs (monotonically increasing, good enough for Play Store)
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-release-

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build & Sign Release APK
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}" \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.SIGNING_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.SIGNING_KEY_PASSWORD }}"

      - name: Build Release APK (unsigned — no keystore configured)
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 == '' }}
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}"

      - name: Stage APK with versioned filename
        run: |
          VER="${VERSION_NAME#v}"
          mkdir -p release
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} "release/EbookReader-${VER}.apk" \;
          echo "Staged: release/EbookReader-${VER}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EbookReader-${{ env.VERSION_NAME }}
          path: release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
          body: |
            ## EbookReader ${{ env.VERSION_NAME }}

            Install the APK on any Android device running API 26 (Android 8.0) or higher.

            > You may need to enable **Install from unknown sources** in your Android settings.

            ### What's changed
            See the auto-generated release notes below.
