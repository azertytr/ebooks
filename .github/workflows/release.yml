name: Manual Release APK

# For one-off manual builds only.
# Automated releases on every commit to main are handled by auto-release.yml.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    env:
      VERSION_NAME: v${{ github.event.inputs.version_name }}
      VERSION_CODE: ${{ github.run_number }}
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-release-

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: Decode keystore
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build & sign release APK
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}" \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.SIGNING_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.SIGNING_KEY_PASSWORD }}"

      - name: Build unsigned release APK
        if: env.SIGNING_KEYSTORE_BASE64 == ''
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}"

      - name: Stage APK
        run: |
          VER="${VERSION_NAME#v}"
          mkdir -p release
          find app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} "release/EbookReader-${VER}.apk" \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EbookReader-${{ env.VERSION_NAME }}
          path: release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_NAME }}
          name: EbookReader ${{ env.VERSION_NAME }}
          files: release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
